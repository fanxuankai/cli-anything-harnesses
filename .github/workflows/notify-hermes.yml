name: Notify Hermes

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - ".github/workflows/notify-hermes.yml"
      - "skills/**"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build Hermes payload
        id: payload
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          before = os.environ.get("GITHUB_EVENT_BEFORE", "")
          after = os.environ["GITHUB_SHA"]
          if before and before != "0000000000000000000000000000000000000000":
              diff_range = f"{before}..{after}"
          else:
              diff_range = "HEAD~1..HEAD"

          watched_paths = ("skills", ".github/workflows/notify-hermes.yml")

          try:
              changed = subprocess.check_output(
                  ["git", "diff", "--name-only", diff_range, "--", *watched_paths],
                  text=True,
              ).splitlines()
          except subprocess.CalledProcessError:
              changed = []

          skill_names = sorted(
              {
                  Path(path).parts[1]
                  for path in changed
                  if len(Path(path).parts) >= 2 and Path(path).parts[0] == "skills"
              }
          )
          owner, repo_name = os.environ["GITHUB_REPOSITORY"].split("/", 1)
          commit_url = f"https://github.com/{os.environ['GITHUB_REPOSITORY']}/commit/{after}"
          payload = {
              "event_type": "push",
              "event": "push",
              "type": "skills_changed",
              "repo": os.environ["GITHUB_REPOSITORY"],
              "repository_full_name": os.environ["GITHUB_REPOSITORY"],
              "repository": {
                  "name": repo_name,
                  "full_name": os.environ["GITHUB_REPOSITORY"],
                  "html_url": f"https://github.com/{os.environ['GITHUB_REPOSITORY']}",
                  "owner": {
                      "login": owner,
                  },
              },
              "ref": os.environ["GITHUB_REF"],
              "branch": os.environ["GITHUB_REF_NAME"],
              "sha": after,
              "actor": os.environ["GITHUB_ACTOR"],
              "message": os.environ.get("GITHUB_EVENT_HEAD_COMMIT_MESSAGE", ""),
              "head_commit": {
                  "id": after,
                  "message": os.environ.get("GITHUB_EVENT_HEAD_COMMIT_MESSAGE", ""),
                  "url": commit_url,
              },
              "sender": {
                  "login": os.environ["GITHUB_ACTOR"],
              },
              "changed_files": changed,
              "skills": skill_names,
              "run_id": os.environ["GITHUB_RUN_ID"],
              "run_url": f"https://github.com/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}",
          }

          output_path = Path(os.environ["RUNNER_TEMP"]) / "hermes-payload.json"
          output_path.write_text(json.dumps(payload, ensure_ascii=False), encoding="utf-8")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"payload_path={output_path}\n")
              output.write(f"change_count={len(changed)}\n")
          PY
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_EVENT_HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}

      - name: Show Hermes payload
        run: |
          cat "${{ steps.payload.outputs.payload_path }}"

      - name: Compute Hermes signature
        id: sign
        if: ${{ steps.payload.outputs.change_count != '0' }}
        env:
          HERMES_WEBHOOK_SECRET: ${{ secrets.HERMES_WEBHOOK_SECRET }}
          PAYLOAD_PATH: ${{ steps.payload.outputs.payload_path }}
        run: |
          if [ -z "$HERMES_WEBHOOK_SECRET" ]; then
            echo "HERMES_WEBHOOK_SECRET is not configured."
            exit 1
          fi

          sig="sha256=$(openssl dgst -sha256 -hmac "$HERMES_WEBHOOK_SECRET" -binary "$PAYLOAD_PATH" | xxd -p -c 256)"
          echo "signature=$sig" >> "$GITHUB_OUTPUT"

      - name: Notify Hermes webhook
        if: ${{ steps.payload.outputs.change_count != '0' }}
        env:
          HERMES_WEBHOOK_URL: ${{ secrets.HERMES_WEBHOOK_URL }}
          HERMES_SIGNATURE: ${{ steps.sign.outputs.signature }}
          PAYLOAD_PATH: ${{ steps.payload.outputs.payload_path }}
        run: |
          if [ -z "$HERMES_WEBHOOK_URL" ]; then
            echo "HERMES_WEBHOOK_URL is not configured; skip Hermes notification."
            exit 0
          fi

          args=(
            --fail
            --show-error
            --silent
            --request POST
            --header "Content-Type: application/json"
            --header "X-GitHub-Event: push"
            --header "X-GitHub-Delivery: ${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
            --header "X-Hub-Signature-256: ${HERMES_SIGNATURE}"
            --data-binary "@${PAYLOAD_PATH}"
          )

          curl "${args[@]}" "$HERMES_WEBHOOK_URL"
