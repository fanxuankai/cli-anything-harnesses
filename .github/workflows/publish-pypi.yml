name: Publish PyPI

on:
  push:
    branches: [ "main" ]
    paths:
      - "agent-harness/ms/setup.py"
      - "agent-harness/cliproxyapi/setup.py"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest click requests rich PyYAML
          pip install -e agent-harness/cliproxyapi
          pip install -e agent-harness/ms

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Test with pytest
        run: |
          pytest --import-mode=importlib \
            agent-harness/cliproxyapi/cli_anything/cliproxyapi/tests \
            agent-harness/ms/cli_anything/ms/tests

  publish:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: ms
            pypi_name: cli-anything-ms
            path: agent-harness/ms
          - package: cliproxyapi
            pypi_name: cli-anything-cliproxyapi
            path: agent-harness/cliproxyapi

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Check PyPI version
        id: version
        env:
          PACKAGE_NAME: ${{ matrix.pypi_name }}
          PACKAGE_PATH: ${{ matrix.path }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import re
          import urllib.error
          import urllib.request
          from pathlib import Path
          import os

          package_name = os.environ["PACKAGE_NAME"]
          package_path = Path(os.environ["PACKAGE_PATH"])
          setup_py = package_path / "setup.py"
          text = setup_py.read_text(encoding="utf-8")
          match = re.search(r'version\s*=\s*["\']([^"\']+)["\']', text)
          if not match:
              raise SystemExit(f"Cannot find version in {setup_py}")

          version = match.group(1)
          url = f"https://pypi.org/pypi/{package_name}/{version}/json"
          exists = False
          try:
              with urllib.request.urlopen(url, timeout=20) as response:
                  json.load(response)
              exists = True
          except urllib.error.HTTPError as exc:
              if exc.code != 404:
                  raise

          print(f"version={version}")
          print(f"publish={'false' if exists else 'true'}")
          print(f"checked_url={url}")
          PY

      - name: Show publish decision
        run: |
          echo "package=${{ matrix.pypi_name }}"
          echo "version=${{ steps.version.outputs.version }}"
          echo "publish=${{ steps.version.outputs.publish }}"
          echo "checked_url=${{ steps.version.outputs.checked_url }}"

      - name: Build package
        if: ${{ steps.version.outputs.publish == 'true' }}
        working-directory: ${{ matrix.path }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          rm -rf build dist ./*.egg-info
          python -m build
          python -m twine check dist/*

      - name: Publish package to PyPI
        if: ${{ steps.version.outputs.publish == 'true' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: ${{ secrets.TWINE_USERNAME }}
          password: ${{ secrets.TWINE_PASSWORD }}
          packages-dir: ${{ matrix.path }}/dist/

      - name: Record published package
        if: ${{ steps.version.outputs.publish == 'true' }}
        env:
          PACKAGE: ${{ matrix.package }}
          PYPI_NAME: ${{ matrix.pypi_name }}
          PACKAGE_PATH: ${{ matrix.path }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          data = {
              "cli": os.environ["PACKAGE"],
              "pypi_name": os.environ["PYPI_NAME"],
              "path": os.environ["PACKAGE_PATH"],
              "version": os.environ["VERSION"],
              "pypi_url": f"https://pypi.org/project/{os.environ['PYPI_NAME']}/{os.environ['VERSION']}/",
              "pypi_json_url": f"https://pypi.org/pypi/{os.environ['PYPI_NAME']}/{os.environ['VERSION']}/json",
          }
          path = Path(os.environ["RUNNER_TEMP"]) / "published-package.json"
          path.write_text(json.dumps(data, ensure_ascii=False), encoding="utf-8")
          print(path)
          PY

      - name: Upload published package record
        if: ${{ steps.version.outputs.publish == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: published-package-${{ matrix.package }}
          path: ${{ runner.temp }}/published-package.json
