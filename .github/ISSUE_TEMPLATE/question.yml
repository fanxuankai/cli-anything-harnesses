name: Question
description: Ask about usage, installation, release versions, or skill behavior.
title: "[Question]: "
labels:
  - question
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - cli-anything-ms
        - cli-anything-cliproxyapi
        - skills
        - GitHub / docs
        - Other
    validations:
      required: true
  - type: textarea
    id: question
    attributes:
      label: Question
      description: Describe what you are trying to do and where you are stuck.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Include commands, versions, or links if useful. Remove secrets before posting.
      render: text
    validations:
      required: false
